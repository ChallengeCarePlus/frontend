<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CarePlus</title>
</head>

<body class="max-w-md mx-auto min-h-screen p-4 flex-1">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img class="w-12 h-12 rounded-full object-cover" src="./src/assets/imgs/thispersondoesnotexist 1.png"
                alt="Avatar">
            <div class="flex flex-col">
                <p class="shrink-0 text-[#1C9770] font-bold text-xl">Marcos</p>
                <div class="flex items-center gap-1">
                    <img class="w-4 h-4" src="./src/assets/svgs/Vector.svg" alt="Ícone de fogo">
                    <p class="shrink-0 text-[#1C9770] font-bold text-base">3 dias</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-1">
            <img class="w-6 h-6" src="./src/assets/svgs/spark.svg" alt="Ícone de energia">
            <p class="shrink-0 font-bold text-base">100</p>
        </div>
    </header>

    <main class="flex flex-col">
        <p class="mb-4 shrink-0 text-[#1C9770] font-bold text-xl">Missões diárias:</p>
        <div class="flex items-center gap-5 mb-8">
            <img src="./src/assets/svgs/run.svg" class="w-8 h-10">
            <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden">

                <div class="w-3/4 h-full bg-green-800"></div>

            </div>

            <p class="w-14 text-right text-sm shrink-0 font-bold">10 km</p>
        </div>
        <div class="flex items-center gap-5 mb-8 w-full">
            <img src="./src/assets/svgs/water.svg" class="w-8 h-10">
            <div class="flex-1 flex items-center gap-2">
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="flex-1 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
            </div>

            <p class="w-14 text-right text-sm shrink-0 font-bold">8 copos</p>
        </div>

        <div class="flex items-center gap-5 mb-8 w-full">
            <img src="./src/assets/svgs/medi.svg" class="w-8 h-10">
            <div class="flex-1 h-2.5 bg-green-800 rounded-full overflow-hidden"></div>
            <input type="checkbox" class="w-14 h-5 border">
        </div>
        <p class="mb-4 shrink-0 text-[#1C9770] font-bold text-xl">Missões semanais:</p>
        <div class="flex items-center gap-5 mb-8 w-full">
            <img src="./src/assets/svgs/bed.svg" class="w-8 h-8">
            <div class="flex-1 flex items-center justify-between">
                <div class="w-11 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="w-11 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="w-11 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="w-11 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                <div class="w-11 h-2.5 border border-green-800 bg-white rounded-full overflow-hidden"></div>
            </div>

            <p class="w-14 text-right text-sm shrink-0 font-bold">7 hrs+</p>
        </div>
        <div class="text-center">
            <button
                class="mb-8 py-4 px-8 bg-[#1C9770] rounded-lg shadow-md text-white font-bold text-sm max-w-xs shrink-0">
                Adicionar metas
            </button>
        </div>
        <nav
            class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md flex justify-around items-center bg-white pb-7">
            <button>
                <img src="./src/assets/svgs/home.svg" class="w-auto">

            </button>
            <button link="./src/pages/rewards.html">
                <a href="./src/pages/rewards.html">
                    <img src="./src/assets/svgs/rewards.svg" class="w-auto">
                </a>
            </button>
            <button>
                <img src="./src/assets/svgs/settings.svg" class="w-auto">
            </button>
        </nav>
    </main>
</body>

</html>
