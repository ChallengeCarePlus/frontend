<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CarePlus - Home</title>
</head>

<body class="min-h-screen flex flex-col md:flex-row bg-white md:bg-gray-50 text-gray-800">
    
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white p-4 border-t border-gray-200 z-50 lg:relative lg:w-64 lg:h-screen lg:flex-col lg:justify-start lg:items-start lg:border-t-0 lg:border-r lg:p-8 lg:gap-6">
        
        <div class="hidden lg:block w-full mb-8">
            <h1 class="text-[#1C9770] font-black text-2xl tracking-tight">CarePlus+</h1>
        </div>

        <button class="md:w-full">
            <a href="./index.html" class="flex items-center gap-4 md:w-full md:p-3 md:bg-green-50 md:rounded-xl transition-colors">
                <img src="./src/assets/svgs/home.svg" class="w-6 h-6 md:w-7 md:h-7">
                <span class="hidden md:block font-bold text-[#1C9770] text-lg">Início</span>
            </a>
        </button>
        <button class="md:w-full text-left">
            <a href="./src/pages/rewards.html" class="flex items-center gap-4 md:w-full md:p-3 md:hover:bg-gray-100 md:rounded-xl transition-colors">
                <img src="./src/assets/svgs/rewards.svg" class="w-6 h-6 md:w-7 md:h-7">
                <span class="hidden md:block font-bold text-gray-500 text-lg">Recompensas</span>
            </a>
        </button>
        <button class="md:w-full text-left">
            <a href="#" class="flex items-center gap-4 md:w-full md:p-3 md:hover:bg-gray-100 md:rounded-xl transition-colors">
                <img src="./src/assets/svgs/settings.svg" class="w-6 h-6 md:w-7 md:h-7">
                <span class="hidden md:block font-bold text-gray-500 text-lg">Ajustes</span>
            </a>
        </button>
    </nav>

    <main class="flex-1 w-full max-w-md mx-auto md:max-w-5xl p-4 pb-24 md:p-10 md:pb-10 overflow-y-auto">
        
        <header class="flex justify-between items-center mb-8 md:bg-white md:p-6 md:rounded-2xl md:shadow-sm md:border md:border-gray-100">
            <div class="flex items-center gap-3">
                <img class="w-12 h-12 md:w-16 md:h-16 rounded-full object-cover" src="./src/assets/imgs/thispersondoesnotexist 1.png" alt="Avatar">
                <div class="flex flex-col">
                    <p class="shrink-0 text-[#1C9770] font-bold text-xl md:text-2xl">Marcos</p>
                    <div class="flex items-center gap-1">
                        <img class="w-4 h-4 md:w-5 md:h-5" src="./src/assets/svgs/Vector.svg" alt="Ícone de fogo">
                        <p class="shrink-0 text-[#1C9770] font-bold text-base md:text-lg">3 dias</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-yellow-50 px-4 py-2 rounded-xl">
                <img class="w-6 h-6 md:w-8 md:h-8" src="./src/assets/svgs/spark.svg" alt="Ícone de energia">
                <p class="shrink-0 font-black text-xl md:text-2xl text-yellow-600">100</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="md:bg-white md:p-8 md:rounded-3xl md:shadow-sm md:border md:border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="shrink-0 text-[#1C9770] font-bold text-xl md:text-2xl">Missões diárias:</h2>
                </div>
                
                <div class="flex items-center gap-5 mb-8">
                    <img src="./src/assets/svgs/run.svg" class="w-8 h-10 md:w-10 md:h-12">
                    <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden">
                        <div class="w-3/4 h-full bg-green-800"></div>
                    </div>
                    <p class="w-16 text-right text-sm md:text-base shrink-0 font-bold">10 km</p>
                </div>
                
                <div class="flex items-center gap-5 mb-8 w-full">
                    <img src="./src/assets/svgs/water.svg" class="w-8 h-10 md:w-10 md:h-12">
                    <div class="flex-1 flex items-center gap-2">
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                    </div>
                    <p class="w-16 text-right text-sm md:text-base shrink-0 font-bold">8 copos</p>
                </div>

                <div class="flex items-center gap-5 w-full md:mb-0 mb-8">
                    <img src="./src/assets/svgs/medi.svg" class="w-8 h-10 md:w-10 md:h-12">
                    <div class="flex-1 h-3 bg-green-800 rounded-full overflow-hidden"></div>
                    <input type="checkbox" class="w-8 h-8 border-2 border-gray-300 rounded-md accent-[#1C9770] cursor-pointer">
                </div>
            </div>

            <div class="flex flex-col justify-between">
                <div class="md:bg-white md:p-8 md:rounded-3xl md:shadow-sm md:border md:border-gray-100">
                    <h2 class="mb-6 shrink-0 text-[#1C9770] font-bold text-xl md:text-2xl">Missões semanais:</h2>
                    
                    <div class="flex items-center gap-5 mb-8 w-full">
                        <img src="./src/assets/svgs/bed.svg" class="w-8 h-8 md:w-10 md:h-10">
                        <div class="flex-1 flex items-center justify-between gap-1">
                            <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                            <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                            <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                            <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                            <div class="flex-1 h-3 border border-green-800 bg-white rounded-full overflow-hidden"></div>
                        </div>
                        <p class="w-16 text-right text-sm md:text-base shrink-0 font-bold">7 hrs+</p>
                    </div>
                </div>

                <div class="text-center mt-10 md:mt-4">
                    <button class="w-full md:w-auto py-4 px-10 bg-[#1C9770] hover:bg-green-700 transition-colors rounded-xl shadow-lg shadow-green-200 text-white font-bold text-base md:text-lg">
                        + Adicionar metas
                    </button>
                </div>
            </div>
            
        </div>
    </main>
</body>

</html>
